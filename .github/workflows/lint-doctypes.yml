name: Lint doctypes.kdl

on:
  push:
    paths:
      - "boilerplate-v1/doctypes.kdl"
  pull_request:
    paths:
      - "boilerplate-v1/doctypes.kdl"
  workflow_dispatch: {}

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install kdl
      run: pip install kdl-py==1.2.0
    - name: Lint doctypes.kdl
      run: python .github/workflows/lint/lint-doctypes.py
